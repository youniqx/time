query IssuesQuery(
  $namespaceFullPath: ID!,
  $iterationCadenceNamespaceFullPath: ID!,
  $iterationCadenceId: [IterationsCadenceID!],
  $pinnedIds: [WorkItemID!] = [],
  $search: String = "",
  $doPinnedSearch: Boolean! = false,
  $doSearch: Boolean! = false
) {
  currentUser {
    id
  }
  iterationCadenceNamespace: namespace(
    fullPath: $iterationCadenceNamespaceFullPath
  ) {
    workItems(iterationWildcardId: CURRENT, iterationCadenceId: $iterationCadenceId, includeDescendants: true) {
      nodes {
        ...bareWorkItem
        widgets {
          ... on WorkItemWidgetHierarchy {
            parent {
              ...bareWorkItem
            }
          }
        }
      }
    }
  }
  searchNamespace: namespace(fullPath: $namespaceFullPath) {
    pinned: workItems(ids: $pinnedIds, sort: UPDATED_DESC, includeDescendants: true) @include(if: $doPinnedSearch) {
      nodes {
        ...bareWorkItem
      }
    }
    search: workItems(search: $search, sort: UPDATED_DESC, includeDescendants: true) @include(if: $doSearch) {
      nodes {
        ...bareWorkItem
      }
    }
    searchIid: workItems(iid: $search, includeDescendants: true) @include(if: $doSearch) {
      nodes {
        ...bareWorkItem
      }
    }
  }
}

fragment bareWorkItem on WorkItem {
  id
  iid
  workItemType {
    id
    name
  }
  title
  webUrl
  state
  promotedToEpicUrl
  widgets {
    ...bareWorkItemWidgets
  }
}

fragment bareWorkItemWidgets on WorkItemWidget {
  ... on WorkItemWidgetLabels {
    labels {
      nodes {
        id
        color
        title
      }
    }
  }
  ... on WorkItemWidgetAssignees {
    assignees {
      nodes {
        id
        avatarUrl
        name
        username
      }
    }
  }
  ... on WorkItemWidgetTimeTracking {
    timelogs {
      nodes {
        id
        spentAt
        summary
        timeSpent
        user {
          id
        }
      }
    }
  }
}
