query IssuesQuery(
  $group: ID = "youniqx/mia",
  $iterationCadenceId: [IterationsCadenceID!] = "gid://gitlab/Iterations::Cadence/9",
  $pinnedIids: [String!] = [],
  $search: String = "",
  $doPinnedSearch: Boolean! = false,
  $doSearch: Boolean! = false
) {
  namespace(fullPath: $group) {
    sprint: workItems(
      iterationWildcardId: CURRENT
      iterationCadenceId: $iterationCadenceId
      includeDescendants: true
    ) {
      nodes {
        ...bareWorkItem
        widgets {
          ... on WorkItemWidgetHierarchy {
            parent {
              ...bareWorkItem
            }
          }
        }
      }
    }
    pinned: workItems(iids: $pinnedIids, includeDescendants: true) @include(if: $doPinnedSearch) {
      nodes {
        ...bareWorkItem
      }
    }
    search: workItems(search: $search, sort: UPDATED_DESC, includeDescendants: true) @include(if: $doSearch) {
      nodes {
        ...bareWorkItem
      }
    }
    searchIid: workItems(iid: $search, includeDescendants: true) @include(if: $doSearch) {
      nodes {
        ...bareWorkItem
      }
    }
  }
}

fragment bareWorkItem on WorkItem {
  id
  iid
  workItemType {
    id
    name
  }
  title
  webUrl
  state
  promotedToEpicUrl
  widgets {
    ...bareWorkItemWidgets
  }
}

fragment bareWorkItemWidgets on WorkItemWidget {
  ... on WorkItemWidgetLabels {
    labels {
      nodes {
        id
        color
        title
      }
    }
  }
  ... on WorkItemWidgetAssignees {
    assignees {
      nodes {
        avatarUrl
        name
        username
      }
    }
  }
}
