query IssuesQuery(
  $group: ID = "youniqx/mia",
  $iterationCadenceId: [IterationsCadenceID!] = "gid://gitlab/Iterations::Cadence/9",
  $pinnedIids: [String!] = [],
  $search: String = "",
  $doPinnedSearch: Boolean! = false,
  $doSearch: Boolean! = false
) {
  sprint: group(fullPath: $group) {
    issues(iterationWildcardId: CURRENT, iterationCadenceId: $iterationCadenceId) {
      ...issues
    }
  }
  pinned: group(fullPath: $group) @include(if: $doPinnedSearch) {
    issues(iids: $pinnedIids) {
      ...issues
    }
  }
  search: group(fullPath: $group) @include(if: $doSearch) {
    issues(search: $search, sort: UPDATED_DESC) {
      ...issues
    }
  }
  searchIid: group(fullPath: $group) @include(if: $doSearch) {
    issues(iid: $search) {
      ...issues
    }
  }
}

fragment issues on IssueConnection {
  nodes {
    id
    iid
    title
    webUrl
    state
    labels {
      nodes {
        id
        color
        title
      }
    }
    assignees {
      nodes {
        avatarUrl
        name
        username
      }
    }
  }
}