query NamespaceQuery(
  $initial: Boolean! = false,
  $search: String = null,
  $before: String,
  $after: String,
  $first: Int,
  $iterationCadencesSearch: String = null,
  $iterationCadencesBefore: String = null,
  $iterationCadencesAfter: String = null,
  $iterationCadencesFirst: Int = null,
) {
  frecentGroups @include(if: $initial) {
    ...groupWithIterationCadences
  }
  groups(
    allAvailable: true,
    search: $search,
    first: $first,
    before: $before,
    after: $after,
  ) {
    nodes {
      ...groupWithIterationCadences
    }
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
  }
  currentUser @include(if: $initial) {
    id
    namespace {
      ...simpleNamespace
    }
  }
}

fragment groupWithIterationCadences on Group {
  id
  name
  archived
  fullPath
  iterationCadences(
    title: $iterationCadencesSearch,
    first: $iterationCadencesFirst,
    before: $iterationCadencesBefore,
    after: $iterationCadencesAfter,
    active: true,
  ) {
    nodes {
      title @include(if: $initial)
      id @include(if: $initial)
    }
    pageInfo {
      hasPreviousPage
      hasNextPage
      startCursor
      endCursor
    }
  }
}

fragment simpleNamespace on Namespace {
  id
  name
  fullPath
}
