query NamespaceQuery(
  $initial: Boolean! = false,
  $search: String = null,
) {
  frecentGroups @include(if: $initial) {
    ...groupWithIterationCadences
  }
  groups(allAvailable: true, search: $search) {
    nodes {
      ...groupWithIterationCadences
    }
    pageInfo {
      hasPreviousPage
      hasNextPage
    }
  }
  currentUser @include(if: $initial) {
    namespace {
      id
      name
      fullPath
    }
  }
}

fragment groupWithIterationCadences on Group {
  id
  name
  archived
  fullPath
  iterationCadences {
    nodes @include(if: $initial) {
      title @include(if: $initial)
      id @include(if: $initial)
    }
    pageInfo {
      hasPreviousPage
      hasNextPage
      endCursor
    }
  }
}