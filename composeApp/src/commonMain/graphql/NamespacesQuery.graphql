query NamespaceQuery {
  frecentGroups {
    ...groupWithIterationCadences
  }
  groups(allAvailable: true) {
    nodes {
      ...groupWithIterationCadences
    }
    pageInfo {
      hasPreviousPage
      hasNextPage
    }
  }
  currentUser {
    namespace {
      id
      name
      fullPath
    }
  }
}

fragment groupWithIterationCadences on Group {
  id
  name
  archived
  fullPath
  iterationCadences {
    nodes {
      title
      id
    }
  }
}