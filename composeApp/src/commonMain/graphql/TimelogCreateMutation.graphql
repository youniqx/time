mutation TimelogCreateMutation(
  $input: TimelogCreateInput!,
  $workItemId: [WorkItemID!]!,
) {
  timelogCreate(
    input: $input
  ) {
    clientMutationId
    errors
    timelog {
      id
      spentAt
      summary
      timeSpent
      project {
        workItems(ids: $workItemId) {
          nodes {
            ...bareWorkItem
          }
        }
      }
    }
  }
}