mutation TimelogCreateMutation(
  $input: TimelogCreateInput!,
  $workItemIid: String!,
) {
  timelogCreate(
    input: $input
  ) {
    clientMutationId
    errors
    timelog {
      id
      spentAt
      summary
      timeSpent
      project {
        workItems(iid: $workItemIid) {
          nodes {
            ...bareWorkItem
          }
        }
      }
    }
  }
}