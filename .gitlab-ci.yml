---
include:
  - project: 'youniqx/infrastructure/ci-commons'
    ref: v1.87.222
    file: 'global.yaml'
  - project: 'youniqx/infrastructure/ci-commons'
    ref: v1.87.222
    file: 'release.yaml'
  - component: $CI_SERVER_FQDN/youniqx/mia/ci-templates/disable-ltex@main

default:
  retry: 2

variables:
  VAULT_SERVER_URL: https://vault.build.youniqx.cloud
  VAULT_AUTH_ROLE: youniqx_mobile_chapter_time_unprotected
  VERSION_CODE: ${CI_PIPELINE_ID}

pages:
  tags: [linux-unprivileged]
  variables:
    KUBERNETES_MEMORY_REQUEST: 20Gi
    KUBERNETES_MEMORY_LIMIT: 20Gi
  stage: deploy
  image: harbor.youniqx.com/youniqx-cloud-infrastructure/youniqx/mia/android-build:1.11.14
  script:
    - gradle composeApp:wasmJsBrowserDistribution
    - mkdir -p public && cp -R ./composeApp/build/dist/wasmJs/productionExecutable/* ./public
  artifacts:
    paths:
      # The folder that contains the files to be exposed at the Page URL
      - public
  rules:
    # This ensures that only pushes to the default branch will trigger
    # a pages deploy
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH


release-test:
  extends: .release_test


release:
  extends: .release
  secrets:
    GITLAB_TOKEN:
      vault: mobile_chapter/time/protected/semantic_release/gitlab_token@youniqx
      file: false


Build Linux AppImage:
  tags: [linux-unprivileged]
  image: harbor.youniqx.com/youniqx-cloud-infrastructure/youniqx/mia/android-build:1.11.14
  variables:
    KUBERNETES_MEMORY_REQUEST: 20Gi
    KUBERNETES_MEMORY_LIMIT: 20Gi
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION_NAME="${CI_COMMIT_TAG#v}"
    - gradle composeApp:packageAppImage
  artifacts:
    paths:
      - composeApp/build/compose/binaries/main/app/com.youniqx.time/bin/com.youniqx.time


Upload Binaries:
  tags: [linux-unprivileged]
  image: harbor.youniqx.com/youniqx-cloud-infrastructure/youniqx/infrastructure/youniqx-ubuntu:1.8.90
  stage: build
  needs:
    - job: "Build Linux AppImage"
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION_NAME="${CI_COMMIT_TAG#v}"
    - mv composeApp/build/compose/binaries/main/app/com.youniqx.time/bin/com.youniqx.time time.appImage
    - |
      curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file time.appImage \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/com.youniqx.time/${VERSION_NAME}/time.appImage"


Add assets to release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: "Upload Binaries"
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - export VERSION_NAME="${CI_COMMIT_TAG#v}"
    - |
      release-cli create --name "Release $VERSION_NAME" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"time.appImage\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/com.youniqx.time/${VERSION_NAME}/time.appImage\"}"
